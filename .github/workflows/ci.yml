name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to a commit SHA (not a mutable tag) for
      # supply-chain integrity (issue #16); the version is noted in the comment.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20

      - name: Validate HTML
        run: npx --yes html-validate "index.html" "resume.html"

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check links
        uses: lycheeverse/lychee-action@82202e5e9c2f4ef1a55a3d02563e1cb6041e5332 # v2.4.1
        with:
          args: >
            --verbose
            --no-progress
            --accept 200,201,202,203,204,206,301,302,303,307,308,429
            --timeout 20
            --max-retries 3
            .

  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: npm run test:e2e

      # On failure, upload the (re)generated snapshots and the Playwright diff
      # report so baselines can be refreshed when the layout changes.
      - name: Upload Playwright snapshots and report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-snapshots
          path: |
            e2e/**/*.png
            test-results/
          retention-days: 7
          if-no-files-found: ignore
