name: Lighthouse CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHA for supply-chain integrity (issue #16).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20

      - name: Install
        # Use the reproducible, lockfile-driven install (issue #16); the repo
        # ships package-lock.json, so npm ci is deterministic vs. npm install.
        run: npm ci

      - name: Run Lighthouse CI
        run: npm run test:lighthouse
