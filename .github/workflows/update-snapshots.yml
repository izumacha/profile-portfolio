name: Update Playwright Snapshots

# Regenerates the visual-regression baselines inside the CI environment and
# commits them back to the triggering branch. Run this from the Actions tab
# (or via the API) whenever the layout changes and the snapshots need to be
# refreshed. Baselines are platform-specific, so they must be generated on the
# same Linux runner the `visual-regression` job uses.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHA for supply-chain integrity (issue #16).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Update snapshots
        run: npx playwright test --update-snapshots

      - name: Commit updated snapshots
        run: |
          if [[ -n "$(git status --porcelain e2e)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add e2e
            git commit -m "chore: update Playwright visual snapshots"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No snapshot changes to commit."
          fi
