<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Masaki Izumi">
  <!-- サイト本体の --primary(#6366f1) → --accent(#22d3ee) と揃えたブランドグラデーション背景 -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#g)" />
  <!-- ナビバーのロゴ「M.I」に揃えたイニシャル。小サイズでも視認できるよう単色の太字にする -->
  <text
    x="16"
    y="22"
    font-family="Arial, Helvetica, sans-serif"
    font-size="16"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
  >M</text>
</svg>
